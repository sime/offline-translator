<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline Translator</title>
  <link rel="icon" type="image/png" href="../favicon.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#121212">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Offline Translator</h1>
      <div class="header-actions">
        <span id="status">Initializing...</span>
        <button class="btn btn-primary btn-small" id="manage-btn">Languages</button>
      </div>
    </header>

    <div class="language-bar">
      <select id="source-lang" aria-label="Source language"></select>
      <button class="swap-btn" id="swap-btn" title="Swap languages">&#8646;</button>
      <select id="target-lang" aria-label="Target language"></select>
    </div>

    <div id="download-prompt" class="needs-download" style="display: none;">
      <p>Language pack not downloaded yet.</p>
      <button class="btn btn-primary" id="download-prompt-btn">Download</button>
    </div>

    <div class="translation-area">
      <div class="text-panel">
        <label for="source-text">Source</label>
        <textarea id="source-text" placeholder="Type text to translate..." autofocus></textarea>
      </div>
      <div class="text-panel">
        <label for="target-text">Translation</label>
        <textarea id="target-text" readonly placeholder="Translation will appear here..."></textarea>
        <button class="copy-btn" id="copy-btn" title="Copy to clipboard">Copy</button>
      </div>
    </div>
  </div>

  <!-- Language Manager Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2>Manage Languages</h2>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <ul class="lang-list" id="lang-list"></ul>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
